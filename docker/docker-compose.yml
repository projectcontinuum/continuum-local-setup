# ========================================
# Kafka Service Template (not instantiated)
# ========================================
x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:latest
  user: root
  networks:
    - temporal-network
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:19092 > /dev/null 2>&1"]
    interval: 10s
    timeout: 5s
    retries: 10
    start_period: 30s
  environment: &kafka-common-env
    KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,BROKER:PLAINTEXT,EXTERNAL:PLAINTEXT
    KAFKA_PROCESS_ROLES: 'controller,broker'
    KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka1:9093,2@kafka2:9093,3@kafka3:9093'
    TOPIC_AUTO_CREATE: "true"
    KAFKA_CONFLUENT_SCHEMA_REGISTRY_URL: http://schema-registry:8080
    CLUSTER_ID: 'ILFgVkHSQceRTtSEDPN7cQ'

services:
  # ========================================
  # Temporal (Workflow Orchestration)
  # ========================================
  postgresql:
    container_name: temporal-postgresql
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    image: postgres:${POSTGRESQL_VERSION}
    networks:
      - temporal-network
    ports:
      - 35432:5432
    volumes:
      - postgresql-data:/var/lib/postgresql/data
      - ./postgres/init-continuum-db.sh:/docker-entrypoint-initdb.d/init-continuum-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
  temporal:
    container_name: temporal
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/config/dynamicconfig/development-sql.yaml
    image: temporalio/auto-setup:${TEMPORAL_VERSION}
    networks:
      - temporal-network
    ports:
      - 7233:7233
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD-SHELL", "tctl --address localhost:7233 cluster health | grep -q SERVING"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    restart: unless-stopped

  temporal-admin-tools:
    container_name: temporal-admin-tools
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    networks:
      - temporal-network
    stdin_open: true
    tty: true
    restart: unless-stopped

  temporal-search-attributes-init:
    container_name: temporal-search-attributes-init
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    networks:
      - temporal-network
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Temporal server to be ready..."
        max_attempts=30
        attempt=0
        until temporal operator cluster health 2>/dev/null | grep -q "SERVING"; do
          attempt=$((attempt + 1))
          if [ $$attempt -ge $$max_attempts ]; then
            echo "Temporal server did not become ready in time, exiting..."
            exit 1
          fi
          echo "Temporal not ready yet (attempt $$attempt/$$max_attempts), waiting..."
          sleep 5
        done
        echo "Temporal cluster is healthy. Waiting for default namespace..."
        until temporal operator namespace describe default > /dev/null 2>&1; do
          echo "Default namespace not ready yet, waiting..."
          sleep 3
        done
        echo "Temporal is ready. Creating search attributes..."
        temporal operator search-attribute create --name "Continuum:ExecutionStatus" --type Int || true
        temporal operator search-attribute create --name "Continuum:WorkflowFileName" --type Keyword || true
        echo "Search attributes created successfully!"
    restart: "no"

  temporal-ui:
    container_name: temporal-ui
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    image: temporalio/ui:${TEMPORAL_UI_VERSION}
    networks:
      - temporal-network
    ports:
      - 38081:8080
    restart: unless-stopped

  # ========================================
  # Mosquitto (MQTT Broker)
  # ========================================
  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - 31883:1883
      - 31884:1884
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto-log:/mosquitto/log
      - mosquitto-data:/mosquitto/data
    networks:
      - temporal-network
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/broker/uptime' -C 1 -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ========================================
  # Kafka (Event Streaming) - KRaft Cluster
  # ========================================
  kafka1:
    <<: *kafka-common
    hostname: kafka1
    ports:
      - "39092:39092"
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: BROKER://:19092,EXTERNAL://:39092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: BROKER://kafka1:19092,EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:39092
    volumes:
      - kafka-data-1:/var/lib/kafka/data

  kafka2:
    <<: *kafka-common
    hostname: kafka2
    ports:
      - "39093:39093"
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: BROKER://:19092,EXTERNAL://:39093,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: BROKER://kafka2:19092,EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:39093
    volumes:
      - kafka-data-2:/var/lib/kafka/data

  kafka3:
    <<: *kafka-common
    hostname: kafka3
    ports:
      - "39094:39094"
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: BROKER://:19092,EXTERNAL://:39094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: BROKER://kafka3:19092,EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:39094
    volumes:
      - kafka-data-3:/var/lib/kafka/data

  schema-registry:
    image: confluentinc/cp-schema-registry:7.2.2
    hostname: schema-registry
    container_name: schema-registry
    ports:
      - "38080:8080"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka1:19092,PLAINTEXT://kafka2:19092,PLAINTEXT://kafka3:19092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8080
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    networks:
      - temporal-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "38082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: LOCAL_SPRING_CLOUD
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: PLAINTEXT://kafka1:19092,PLAINTEXT://kafka2:19092,PLAINTEXT://kafka3:19092
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8080
    depends_on:
      schema-registry:
        condition: service_healthy
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    networks:
      - temporal-network
    restart: unless-stopped

  # ========================================
  # MinIO (S3-Compatible Object Storage)
  # ========================================
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "39000:9000"
      - "39001:9001"
    volumes:
      - minio-data:/data
    networks:
      - temporal-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ========================================
  # Continuum Platform Services
  # ========================================
  continuum-api-server:
    image: projectcontinuum/continuum-api-server:0.0.9
    container_name: continuum-api-server
    ports:
      - "8080:8080"
    environment:
      TEMPORAL_SERVER_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      CONTINUUM_STORAGE_TYPE: minio
      CONTINUUM_MINIO_ENDPOINT: http://minio:9000
      CONTINUUM_MINIO_USERNAME: minioadmin
      CONTINUUM_MINIO_PASSWORD: minioadmin
      CONTINUUM_CACHE_BUCKET_NAME: continuum-worker-storage
      CONTINUUM_CACHE_BUCKET_REGION: us-east-2
      CONTINUUM_CACHE_BUCKET_BASE_PATH: workflow-data
      CONTINUUM_DB_URL: jdbc:postgresql://postgresql:5432/continuum
      CONTINUUM_DB_USERNAME: continuum_owner
      CONTINUUM_DB_PASSWORD: continuum-test-password
    depends_on:
      temporal:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgresql:
        condition: service_healthy
    networks:
      - temporal-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped
  continuum-orchestration-service:
    image: projectcontinuum/continuum-orchestration-service:0.0.9
    container_name: continuum-orchestration-service
    environment:
      CONTINUUM_KAFKA_MAIN_BROKER_LIST: PLAINTEXT://kafka1:19092,PLAINTEXT://kafka2:19092,PLAINTEXT://kafka3:19092
      CONTINUUM_KAFKA_MAIN_SCHEMA_REGISTRY: http://schema-registry:8080
      TEMPORAL_SERVER_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      CONTINUUM_API_SERVER_BASE_URL: http://continuum-api-server:8080
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
      temporal:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      continuum-api-server:
        condition: service_healthy
    networks:
      - temporal-network
    restart: unless-stopped
  continuum-message-bridge:
    image: projectcontinuum/continuum-message-bridge:0.0.9
    container_name: continuum-message-bridge
    environment:
      CONTINUUM_KAFKA_MAIN_BROKER_LIST: PLAINTEXT://kafka1:19092,PLAINTEXT://kafka2:19092,PLAINTEXT://kafka3:19092
      CONTINUUM_KAFKA_MAIN_SCHEMA_REGISTRY: http://schema-registry:8080
      JAVA_TOOL_OPTIONS: -Dcontinuum.core.bridge.mqtt.server-uri=tcp://mosquitto:1883
      CONTINUUM_DB_URL: jdbc:postgresql://postgresql:5432/continuum
      CONTINUUM_DB_USERNAME: continuum_owner
      CONTINUUM_DB_PASSWORD: continuum-test-password
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      postgresql:
        condition: service_healthy
    networks:
      - temporal-network
    restart: unless-stopped
  continuum-workbench:
    image: projectcontinuum/continuum-workbench:0.0.2
    container_name: continuum-workbench
    ports:
      - "3002:8080"
    volumes:
      - ./example-workflows:/home/node/example-workflows
    depends_on:
      continuum-api-server:
        condition: service_healthy
    networks:
      - temporal-network
    restart: unless-stopped
  continuum-feature-base:
    image: projectcontinuum/continuum-feature-base:0.0.4
    container_name: continuum-feature-base
    environment:
      CONTINUUM_KAFKA_MAIN_BROKER_LIST: PLAINTEXT://kafka1:19092,PLAINTEXT://kafka2:19092,PLAINTEXT://kafka3:19092
      CONTINUUM_KAFKA_MAIN_SCHEMA_REGISTRY: http://schema-registry:8080
      TEMPORAL_SERVER_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      CONTINUUM_MINIO_ENDPOINT: http://minio:9000
      CONTINUUM_API_SERVER_BASE_URL: http://continuum-api-server:8080
      CONTINUUM_NODE_TASK_QUEUE: CONTINUUM_FEATURE_BASE_TASK_QUEUE
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
      temporal:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      minio:
        condition: service_healthy
      continuum-api-server:
        condition: service_healthy
    networks:
      - temporal-network
    restart: unless-stopped
  continuum-feature-cheminformatics:
    image: projectcontinuum/continuum-feature-cheminformatics:0.0.2
    container_name: continuum-feature-cheminformatics
    environment:
      CONTINUUM_KAFKA_MAIN_BROKER_LIST: PLAINTEXT://kafka1:19092,PLAINTEXT://kafka2:19092,PLAINTEXT://kafka3:19092
      CONTINUUM_KAFKA_MAIN_SCHEMA_REGISTRY: http://schema-registry:8080
      TEMPORAL_SERVER_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      CONTINUUM_MINIO_ENDPOINT: http://minio:9000
      CONTINUUM_API_SERVER_BASE_URL: http://continuum-api-server:8080
      CONTINUUM_NODE_TASK_QUEUE: CONTINUUM_CHEMINFORMATICS_WORKER_TASK_QUEUE
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
      temporal:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      minio:
        condition: service_healthy
      continuum-api-server:
        condition: service_healthy
    networks:
      - temporal-network
    restart: unless-stopped
networks:
  temporal-network:
    driver: bridge
    name: temporal-network

volumes:
  postgresql-data:
    driver: local
  mosquitto-log:
    driver: local
  mosquitto-data:
  kafka-data-1:
  kafka-data-2:
  kafka-data-3:
  minio-data:
